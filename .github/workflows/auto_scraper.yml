name: Daily Game Auto Scraper

on:
  schedule:
    # 每天 UTC 23:45 执行 (北京时间 07:45)
    - cron: '45 23 * * *'
  # 手动触发按钮，方便测试
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pillow google-generativeai python-dotenv flask cloudscraper google-auth

      - name: Run daily update pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          GOOGLE_SEARCH_CONSOLE_SITEMAP_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITEMAP_URL }}
          GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON }}
        run: |
          cd automation
          python daily_update.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "🤖 Auto: Daily game update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed or nothing to push"
